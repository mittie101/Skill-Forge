<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 1555px;
      height: 875px;
      overflow: hidden;
      background: #0a0a14;
      -webkit-app-region: drag;
    }
    #splash {
      position: absolute;
      top: 0; left: 0;
      width: 1555px;
      height: 875px;
      transition: opacity 0.6s ease;
    }
    #splash.fade-out { opacity: 0; }
  </style>
</head>
<body>
  <img id="splash" src="../build/Start.svg" width="1555" height="875" alt="">
  <script>
    setTimeout(function () {
      document.getElementById('splash').classList.add('fade-out');
    }, 4400);
  </script>
</body>
</html>
