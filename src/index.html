<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-views.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span class="logo-text">SkillForge</span>
            </div>

            <ul class="nav-list">
                <li>
                    <button class="nav-btn active" data-view="generator">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M9 9h6M9 12h6M9 15h4"/>
                        </svg>
                        Generator
                    </button>
                </li>
                <li>
                    <button class="nav-btn" data-view="history">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        History
                    </button>
                </li>
                <li>
                    <button class="nav-btn" data-view="settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                        </svg>
                        Settings
                    </button>
                </li>
            </ul>

            <div class="sidebar-footer">
                <span class="version">v0.1.0</span>
            </div>
        </nav>

        <main id="content">
            <div id="view-generator" class="view active">
                <!-- Populated by src/views/generator.js -->
            </div>
            <div id="view-history" class="view">
                <!-- Populated by src/views/history.js -->
            </div>
            <div id="view-settings" class="view">
                <!-- Populated by src/views/settings.js -->
            </div>
        </main>
    </div>

    <div id="toast-container" aria-live="polite"></div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>

    <script src="lib/marked.min.js"></script>
    <script src="lib/toast.js"></script>
    <script src="views/generator.js"></script>
    <script src="views/history.js"></script>
    <script src="views/settings.js"></script>
    <script src="app.js"></script>
</body>
</html>
